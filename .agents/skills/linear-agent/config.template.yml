# ==============================================================================
# Linear Issue Agent — Per-Repository Configuration
# ==============================================================================
#
# Copy this file to your repo at: .agents/config/linear-agent.yml
# Fill in the REQUIRED fields. Optional fields have sensible defaults.
#
# ==============================================================================

# ─── REQUIRED ─────────────────────────────────────────────────────────────────

# Linear project name, slug, or ID
# Find this in your Linear project settings or URL
linear_project: ""

# Linear team name or key (e.g., "Engineering" or "ENG")
linear_team: ""

# ─── GIT & BRANCHING ─────────────────────────────────────────────────────────

# Base branch for feature branches (leave empty to auto-detect)
# Common values: "main", "master", "develop"
base_branch: ""

# Branch prefix pattern (the issue ID and title slug are appended automatically)
# Example: "feature/" produces branches like "feature/lin-42-fix-login"
branch_prefix: "feature/"

# Prefer merge over rebase when syncing with base branch (safer for collaborative branches)
# When true, always uses merge. When false (default), uses rebase for single-author branches
# and merge when multiple contributors are detected.
prefer_merge_over_rebase: false

# ─── COMMANDS ─────────────────────────────────────────────────────────────────

# Dev server command (for local testing during review)
# Examples: "npm run dev", "flutter run", "python manage.py runserver"
dev_command: ""

# Dev server port (used for local testing URLs)
dev_port: 3000

# Build/compile command (run as quality gate before PR)
# Examples: "npm run build", "flutter build", "cargo build"
build_command: ""

# Test command (run as quality gate before PR)
# Examples: "npm test", "flutter test", "pytest", "cargo test"
test_command: ""

# Lint/format command (run as quality gate before PR)
# Examples: "npm run lint", "flutter analyze", "ruff check ."
lint_command: ""

# ─── ISSUE SELECTION ──────────────────────────────────────────────────────────

# Priority order for auto-picking issues
# 1=Urgent, 2=High, 3=Normal, 4=Low, 0=None
priority_order: [1, 2, 3, 4, 0]

# Auto-pick the highest priority issue without asking the user
# When false (default), presents a selection menu
auto_pick_highest: false

# Maximum number of issues to display in the discovery table
# Keeps the context window manageable for large projects
max_issues_display: 20

# Only show issues with these Linear labels (leave empty for all)
# Example: ["frontend", "bug"]
linear_labels: []

# ─── DEPLOYMENT ───────────────────────────────────────────────────────────────

# Deployment platform
# Options: "vercel", "netlify", "github-pages", "firebase", "custom", "none"
deployment:
  platform: "none"

  # Preview URL pattern for branch deployments (optional)
  # Use {branch} as placeholder for the branch name
  # Example: "https://{branch}--my-app.netlify.app"
  preview_url_pattern: ""

# ─── PR SETTINGS ──────────────────────────────────────────────────────────────

# Create PRs as drafts (useful for teams that require CI to pass first)
pr_draft: false

# GitHub usernames to automatically request review from
# Example: ["octocat", "mona"]
pr_reviewers: []

# Labels to automatically add to created PRs
# Example: ["agent-created", "auto-pr"]
pr_labels: []

# ─── LINEAR STATUSES ──────────────────────────────────────────────────────────
# Map agent phases to your Linear workflow statuses.
# Leave empty to auto-detect from your team's workflow.
#
# The agent will use list_issue_statuses to find the closest match
# if these are not specified.

statuses:
  todo: ""           # e.g., "Todo", "To Do", "Backlog"
  in_progress: ""    # e.g., "In Progress", "Doing"
  in_review: ""      # e.g., "In Review", "Ready for Testing", "QA"
  done: ""           # e.g., "Done", "Closed", "Complete"

# ─── AGENT BEHAVIOR ──────────────────────────────────────────────────────────

# Skip screenshot capture if browser subagent is unavailable
# When true, the agent won't attempt screenshots and won't block on failure
skip_screenshots: false

# ─── NOTIFICATIONS ──────────────────────────────────────────────────────────
# Send email notifications when human attention is required.
# This way you don't have to keep checking — the agent comes to you.
#
# Recommended setup: msmtp with Gmail SMTP
#   1. brew install msmtp
#   2. Create ~/.msmtprc (see SKILL.md "Notification System" section for template)
#   3. chmod 600 ~/.msmtprc
#   4. Test: echo "test" | msmtp your@gmail.com

# Email address to receive notifications (leave empty to disable email notifications)
notification_email: ""

# How the agent sends email
# Options: "msmtp" (recommended), "sendmail", "mail", "script"
notification_method: "msmtp"

# Custom notification script path (only used when notification_method is "script")
# The script receives two arguments: $1 = subject, $2 = body
# Example: ".agents/scripts/notify.sh"
notification_script: ""

# Which events trigger an email notification
# All default to true when notification_email is set
notify_on:
  plan_approval: true        # Phase 2: plan ready for your review
  review_approval: true      # Phase 5: PR ready for testing/approval
  error_escalation: true     # Phase 4: auto-fix failed after max retries
  conflict_escalation: true  # Phase 6: merge conflict could not be auto-resolved
  ci_failure: true           # Phase 5B: CI failure that could not be auto-fixed

# ─── AUTO ERROR RESOLUTION ──────────────────────────────────────────────────
# The agent will automatically attempt to fix lint, test, and build errors
# before escalating to you. Set max_auto_fix_attempts to 0 to disable
# (always ask user immediately, original behavior).

# Maximum auto-fix attempts per check type before escalating to user
# Each attempt uses a progressively different strategy
max_auto_fix_attempts: 3

# Lint auto-fix command (run as the first fix attempt before manual analysis)
# Examples: "npm run lint -- --fix", "ruff check . --fix", "eslint . --fix"
lint_fix_command: ""

# Proactive conflict resolution after PR push
# When true: agent auto-resolves simple merge conflicts (import ordering,
# whitespace, non-overlapping changes, lock files) and only escalates
# genuinely ambiguous conflicts
# When false: stops and asks user for help on any conflict (original behavior)
proactive_conflict_resolution: true

# Proactive local CI after PR push
# When true: agent re-runs quality gates locally right after pushing,
# in parallel with GitHub Actions, and auto-fixes issues before GH CI reports
# When false: waits for GitHub CI results (original behavior)
proactive_local_ci: true
